<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
</head>
<body>
    <h1>Job Application Tracker</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Role</th>
                <th>Date Applied</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for job in jobs %}
            <tr>
                <td>{{ job.id }}</td>
                <td>{{ job.company }}</td>
                <td>{{ job.role }}</td>
                <td>{{ job.date_applied.strftime('%Y-%m-%d') if job.date_applied else 'N/A' }}</td>
                <td>{{ job.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a id="add-link" href="/add">Add</a>
</body>
</html>
